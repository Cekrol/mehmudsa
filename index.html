<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            background-color: #000000; /* Kesin siyah arka plan */
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            font-family: 'Press Start 2P', monospace;
            position: relative;
        }

        /* --- KÜÇÜK VE ZARİF PARLAYAN YILDIZLAR --- */
        #starContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle linear infinite;
            filter: drop-shadow(0 0 4px #ffffff);
        }

        @keyframes twinkle {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 0.9; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.3); }
        }

        .wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        /* Klasik Pixel Pencere Tasarımı */
        .pixel-window {
            background-color: rgba(10, 10, 10, 0.85);
            border: 6px double #ffffff;
            width: 440px;
            max-width: 90%;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
            z-index: 2;
        }

        .window-bar {
            border-bottom: 4px solid #ffffff;
            padding: 10px;
            display: flex;
            gap: 6px;
        }

        .window-dot {
            width: 8px;
            height: 8px;
            border: 2px solid #ffffff;
        }

        .window-body {
            padding: 45px 20px;
            text-align: center;
        }

        .title-text {
            color: #ffffff;
            font-size: 11pt;
            line-height: 1.8;
            margin: 0 0 40px 0;
            font-weight: normal;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn-wrapper {
            width: 100px; 
            display: flex;
            justify-content: center;
        }

        .pixel-btn {
            background: transparent;
            color: #ffffff;
            border: 4px outset #ffffff;
            padding: 12px 24px;
            font-size: 11pt;
            cursor: pointer;
            font-family: 'Press Start 2P', monospace;
            outline: none;
            transition: background 0.1s ease, color 0.1s ease;
        }

        .pixel-btn:hover {
            background: #ffffff;
            color: #000000;
            border: 4px inset #ffffff;
        }

        #noBtn {
            position: relative;
            z-index: 9999;
        }

        /* --- EVET EKRANI VE MATEMATİKSEL KALP ALANI --- */
        .special-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        #heartCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 21;
        }

        /* Kalbin Ortasında Yavaşça Beliren Pembe Parlayan D Yazısı */
        .center-d {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 25;
            color: #ff66cc;
            font-size: 45pt;
            font-family: 'Press Start 2P', monospace;
            opacity: 0;
            transition: opacity 2.5s ease-in-out; /* Yavaşça belirmesi için */
            text-shadow: 0 0 10px #ff66cc, 0 0 25px #ff007f, 0 0 45px #ff0055;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="starContainer"></div>

    <div class="wrapper" id="viewInterface">
        <div class="pixel-window">
            <div class="window-bar">
                <span class="window-dot"></span>
                <span class="window-dot"></span>
                <span class="window-dot"></span>
            </div>
            <div class="window-body">
                <h1 class="title-text">Ne kadar tartışsakda seni seviyorum peki sen?</h1>
                <div class="btn-container">
                    <div class="btn-wrapper">
                        <button class="pixel-btn" onclick="triggerYes()">Yes</button>
                    </div>
                    <div class="btn-wrapper">
                        <button class="pixel-btn" id="noBtn" onmouseover="fleeNo(event)" ontouchstart="fleeNo(event)">No</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="special-screen" id="specialScreen">
        <canvas id="heartCanvas"></canvas>
        <div class="center-d" id="letterD">D</div>
    </div>

    <script>
        // Küçük ve narin gökyüzü yıldızları oluşturma
        function createSmallStars() {
            const container = document.getElementById('starContainer');
            const starCount = 45; // Hafif ve göz yormayan miktar

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                
                // Yıldızları küçük boyutlara sabitledik
                const size = Math.random() * 3 + 2; 
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                
                const duration = Math.random() * 2 + 1.5; 
                const delay = Math.random() * 3;
                star.style.animationDuration = duration + 's';
                star.style.animationDelay = delay + 's';
                
                container.appendChild(star);
            }
        }
        createSmallStars();

        // Kaçan No Butonu Mantığı
        function fleeNo(e) {
            if (e && e.type === 'touchstart') e.preventDefault();
            
            const btn = document.getElementById('noBtn');
            if (btn.style.position !== 'fixed') {
                const rect = btn.getBoundingClientRect();
                btn.style.position = 'fixed';
                btn.style.left = rect.left + 'px';
                btn.style.top = rect.top + 'px';
                btn.style.transition = 'all 0.25s ease';
            }

            setTimeout(() => {
                const maxX = window.innerWidth - btn.offsetWidth - 25;
                const maxY = window.innerHeight - btn.offsetHeight - 25;
                
                const randomX = Math.max(25, Math.floor(Math.random() * maxX));
                const randomY = Math.max(25, Math.floor(Math.random() * maxY));
                
                btn.style.left = randomX + 'px';
                btn.style.top = randomY + 'px';
            }, 10);
        }

        // Evet'e basınca tetiklenecek fonksiyon
        function triggerYes() {
            const ui = document.getElementById('viewInterface');
            const special = document.getElementById('specialScreen');
            const letterD = document.getElementById('letterD');
            
            ui.style.opacity = '0';
            
            setTimeout(() => {
                ui.style.display = 'none';
                special.style.display = 'block';
                setTimeout(() => {
                    special.style.opacity = '1';
                    // Videodaki matematiksel kalbi başlat
                    startHeartAnimation();
                    
                    // Kalp çizilmeye başladıktan 1 saniye sonra D harfi yavaşça belirsin
                    setTimeout(() => {
                        letterD.style.opacity = '1';
                    }, 1000);
                }, 50);
            }, 500);
        }

        // --- VİDEODAKİ MATEMATİKSEL KALP CANLANDIRMASI (CANVAS PARTICLES) ---
        function startHeartAnimation() {
            const canvas = document.getElementById('heartCanvas');
            const ctx = canvas.getContext('2d');
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            const particles = [];
            const particleCount = 450; // Kalbi oluşturan yoğun parıltı adedi

            // Videoda kullanılan formül tabanlı koordinat fonksiyonu
            function getHeartPoint(t) {
                // n koordinat ölçeği
                const scale = Math.min(canvas.width, canvas.height) / 32; 
                return {
                    x: scale * 16 * Math.pow(Math.sin(t), 3),
                    y: -scale * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
                };
            }

            // Parçacık Sınıfı
            class Particle {
                constructor(targetT) {
                    this.targetT = targetT;
                    this.reset();
                    // İlk açılışta rastgele dağılsınlar, merkeze toplansınlar diye
                    this.x = canvas.width / 2 + (Math.random() - 0.5) * 200;
                    this.y = canvas.height / 2 + (Math.random() - 0.5) * 200;
                }

                reset() {
                    this.basePoint = getHeartPoint(this.targetT);
                    this.size = Math.random() * 2 + 1.5;
                    this.speed = Math.random() * 0.04 + 0.02;
                    this.alpha = Math.random() * 0.5 + 0.5;
                    this.wanderAngle = Math.random() * Math.PI * 2;
                }

                update(pulseFactor) {
                    // Kalp atış (pulse) ritmini formüle dahil etme
                    const targetX = canvas.width / 2 + this.basePoint.x * pulseFactor;
                    const targetY = canvas.height / 2 + this.basePoint.y * pulseFactor;

                    // Noktaya doğru akma hareketi
                    this.x += (targetX - this.x) * this.speed;
                    this.y += (targetY - this.y) * this.speed;

                    // Mikro parıltı ve dalgalanma efekti
                    this.wanderAngle += 0.1;
                    this.x += Math.sin(this.wanderAngle) * 0.3;
                    this.y += Math.cos(this.wanderAngle) * 0.3;
                }

                draw() {
                    ctx.save();
                    ctx.globalAlpha = this.alpha;
                    ctx.fillStyle = '#ffffff'; // Kalp rengi beyaz
                    // Güçlü beyaz parlama etkisi (glow)
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = '#ffffff';
                    
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            // Kalp çevresi boyunca parçacıkları oluştur
            for (let i = 0; i < particleCount; i++) {
                const t = (i / particleCount) * Math.PI * 2;
                particles.push(new Particle(t));
            }

            let loopTime = 0;

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                loopTime += 0.05;

                // Kalbin ritmik olarak atmasını sağlayan çarpan (Pulse)
                const pulseFactor = 1 + 0.07 * Math.sin(loopTime * 1.5);

                particles.forEach(p => {
                    p.update(pulseFactor);
                    p.draw();
                });

                requestAnimationFrame(animate);
            }

            animate();
        }
    </script>
</body>
</html>
