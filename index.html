<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Aşığım</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --star-color: #ffffff;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            font-family: 'Press Start 2P', monospace;
            position: relative;
            transition: background-color 0.5s ease;
        }

        body.white-theme {
            --bg-color: #ffffff;
            --text-color: #000000;
            --star-color: #000000;
        }

        /* --- ÜSTTEKİ TEMA DEĞİŞTİRME BUTONU --- */
        .theme-btn {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            background: transparent;
            color: var(--text-color);
            border: 3px solid var(--text-color);
            padding: 8px 16px;
            font-family: 'Press Start 2P', monospace;
            font-size: 8pt;
            cursor: pointer;
            z-index: 999999;
            transition: all 0.3s ease;
        }
        .theme-btn:hover {
            background: var(--text-color);
            color: var(--bg-color);
        }

        /* --- 1. ADIM: PARMAK İZİ KİLİT EKRANI --- */
        #lockScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.2s ease-in-out, visibility 1.2s ease-in-out;
        }

        .lock-title {
            font-family: 'Dancing Script', cursive;
            color: #ffffff;
            font-size: 32pt;
            margin-bottom: 50px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
            user-select: none;
        }

        .scanner-container {
            position: relative;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 3px solid rgba(255, 45, 85, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 25px rgba(255, 45, 85, 0.1);
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; /* Mobilde basılı tutarken ekranın kaymasını engeller */
        }

        .scanner-container.scanning {
            animation: spinRing 4s linear infinite;
            border-top: 3px solid #ff2d55;
            border-bottom: 3px solid #ff2d55;
            box-shadow: 0 0 25px rgba(255, 45, 85, 0.4);
        }

        @keyframes spinRing {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .scanner-inner {
            position: absolute;
            width: 150px;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        .scanner-container.scanning .scanner-inner {
            animation: stopSpin 4s linear infinite reverse;
        }

        @keyframes stopSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .fingerprint-svg {
            width: 110px;
            height: 140px;
            fill: none;
            stroke: rgba(255, 45, 85, 0.4);
            stroke-width: 10;
            stroke-linecap: round;
            transition: filter 0.3s ease, stroke 0.3s ease;
        }

        .scanner-container.scanning .fingerprint-svg {
            stroke: #ff2d55;
            filter: drop-shadow(0 0 12px #ff2d55);
        }

        .laser-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255, 45, 85, 0.3);
            top: 50%;
            pointer-events: none;
        }

        .scanner-container.scanning .laser-line {
            background: #ff2d55;
            box-shadow: 0 0 15px #ff2d55, 0 0 25px #ff2d55;
            animation: scanMotion 1.2s ease-in-out infinite;
        }

        @keyframes scanMotion {
            0% { top: 10%; }
            50% { top: 90%; }
            100% { top: 10%; }
        }

        .lock-footer {
            font-family: Arial, sans-serif;
            font-style: italic;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14pt;
            margin-top: 50px;
            user-select: none;
        }

        /* --- 4 KENARLI OVAL PARLAYAN YILDIZLAR --- */
        #starContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background-color: var(--star-color);
            clip-path: polygon(50% 0%, 63% 37%, 100% 50%, 63% 63%, 50% 100%, 37% 63%, 0% 50%, 37% 37%);
            opacity: 0;
            animation: twinkle linear infinite;
        }

        @keyframes twinkle {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 0.8; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.3); }
        }

        .wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        .pixel-window {
            background-color: var(--bg-color);
            border: 6px double var(--text-color);
            width: 440px;
            max-width: 90%;
            box-shadow: 0 0 25px rgba(255,255,255,0.05);
            z-index: 2;
            transition: all 0.5s ease;
        }

        .window-bar {
            border-bottom: 4px solid var(--text-color);
            padding: 10px;
            display: flex;
            gap: 6px;
        }

        .window-dot {
            width: 8px;
            height: 8px;
            border: 2px solid var(--text-color);
        }

        .window-body {
            padding: 45px 20px;
            text-align: center;
        }

        .title-text {
            color: var(--text-color);
            font-size: 11pt;
            line-height: 1.8;
            margin: 0 0 40px 0;
            font-weight: normal;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn-wrapper {
            width: 100px; 
            display: flex;
            justify-content: center;
        }

        .pixel-btn {
            background: transparent;
            color: var(--text-color);
            border: 4px outset var(--text-color);
            padding: 12px 24px;
            font-size: 11pt;
            cursor: pointer;
            font-family: 'Press Start 2P', monospace;
            outline: none;
        }

        .pixel-btn:hover {
            background: var(--text-color);
            color: var(--bg-color);
            border: 4px inset var(--text-color);
        }

        #noBtn {
            position: relative;
            z-index: 9999;
        }

        /* --- EVET EKRANI VE KALP ALANI --- */
        .special-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        #heartCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 21;
        }

        /* Ortadaki Harfler Alanı (D ve M Yan Yana) */
        .center-letters {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 25;
            font-size: 45pt;
            font-family: 'Press Start 2P', monospace;
            display: flex;
            gap: 25px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 2.5s ease-in-out;
        }

        .char-d {
            color: #ffffff; 
            text-shadow: 0 0 15px rgba(255,255,255,0.6);
            transition: opacity 0.4s ease;
        }

        .char-m {
            color: #000000; 
            text-shadow: 0 0 15px rgba(255,255,255,0.8);
            transition: opacity 0.4s ease;
        }

        /* Kalbin Altındaki Aşk Sözü */
        .love-quote {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 26;
            font-family: 'Dancing Script', cursive;
            color: #ff2d55;
            font-size: 35pt;
            text-align: center;
            width: 100%;
            opacity: 0;
            transition: opacity 3s ease-in-out;
            text-shadow: 0 0 15px rgba(255, 45, 85, 0.3);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <button id="themeToggleBtn" class="theme-btn" onclick="toggleTheme()">TEMA</button>

    <div id="lockScreen">
        <div class="lock-title">Para ti, mi amor</div>
        
        <div class="scanner-container" id="scannerZone" 
             onpointerdown="startScan()" 
             onpointerup="cancelScan()" 
             onpointerleave="cancelScan()" 
             onpointercancel="cancelScan()">
            <div class="scanner-inner">
                <div class="laser-line"></div>
                <svg class="fingerprint-svg" viewBox="0 0 512 512">
                    <path d="M256,440 C320,440 360,400 360,320 C360,220 290,160 256,160 C222,160 152,220 152,320 C152,350 160,380 180,410" />
                    <path d="M210,425 C200,410 192,380 192,320 C192,250 230,200 256,200 C282,200 320,250 320,320 C320,380 300,410 280,425" />
                    <path d="M256,360 C270,360 280,340 280,320 C280,280 265,240 256,240 C247,240 232,280 232,320 C232,340 242,360 256,360" />
                    <path d="M120,320 C120,180 200,120 256,120 C312,120 392,180 392,320 C392,410 330,460 256,460 C210,460 160,440 130,410" />
                    <path d="M90,340 C90,150 180,80 256,80 C332,80 422,150 422,340 C422,430 370,490 256,490" />
                </svg>
            </div>
        </div>

        <div class="lock-footer">Casi listo...</div>
    </div>

    <div id="starContainer"></div>

    <div class="wrapper" id="viewInterface">
        <div class="pixel-window">
            <div class="window-bar">
                <span class="window-dot"></span>
                <span class="window-dot"></span>
                <span class="window-dot"></span>
            </div>
            <div class="window-body">
                <h1 class="title-text">Ne kadar tartışsakda seni seviyorum peki sen?</h1>
                <div class="btn-container">
                    <div class="btn-wrapper">
                        <button class="pixel-btn" onclick="triggerYes()">Evet</button>
                    </div>
                    <div class="btn-wrapper">
                        <button class="pixel-btn" id="noBtn" onmouseover="fleeNo(event)" ontouchstart="fleeNo(event)">Hayır</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="special-screen" id="specialScreen">
        <canvas id="heartCanvas"></canvas>
        <div class="center-letters" id="centerLetters">
            <span id="letterD" class="char-d">D</span>
            <span id="letterM" class="char-m">M</span>
        </div>
        <div class="love-quote" id="loveQuote">Sana aşığım lan</div>
    </div>

    <script>
        // --- PARMAK İZİ GERÇEKÇİ TARAMA SİSTEMİ ---
        let scanTimer = null;

        function startScan() {
            if (scanTimer) return;

            // Basıldığında tarama efektini aktif et
            document.getElementById('scannerZone').classList.add('scanning');
            
            // 1.5 saniye aralıksız basılırsa kilit açılır
            scanTimer = setTimeout(() => {
                const lock = document.getElementById('lockScreen');
                lock.style.opacity = '0';
                lock.style.visibility = 'hidden';
                document.getElementById('themeToggleBtn').style.display = 'block'; 
                applyLetterVisibility(); 
            }, 1500);
        }

        function cancelScan() {
            if (scanTimer) {
                clearTimeout(scanTimer);
                scanTimer = null;
            }
            // Elini çektiğinde taramayı ve animasyonları kapat
            document.getElementById('scannerZone').classList.remove('scanning');
        }

        // --- SİYAH / BEYAZ TEMA DEĞİŞTİRME MANTIĞI ---
        function toggleTheme() {
            document.body.classList.toggle('white-theme');
            applyLetterVisibility();
        }

        function applyLetterVisibility() {
            const isWhiteTheme = document.body.classList.contains('white-theme');
            const mLetter = document.getElementById('letterM');
            const dLetter = document.getElementById('letterD');
            
            if (isWhiteTheme) {
                if(dLetter) dLetter.style.opacity = '1';
                if(mLetter) mLetter.style.opacity = '0';
            } else {
                if(mLetter) mLetter.style.opacity = '1';
                if(dLetter) dLetter.style.opacity = '0';
            }
        }

        // 4 Köşeli Oval Yıldızları Oluşturma
        function createSmallStars() {
            const container = document.getElementById('starContainer');
            const starCount = 45; 

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                
                const size = Math.random() * 5 + 4; 
                star.style.width = size + 'px';
                star.style.height = (size * 1.2) + 'px';
                
                star.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                star.style.animationDelay = (Math.random() * 3) + 's';
                
                container.appendChild(star);
            }
        }
        createSmallStars();

        // Kusursuz Kaçan Hayır Butonu
        function fleeNo(e) {
            if (e && e.type === 'touchstart') e.preventDefault();
            
            const btn = document.getElementById('noBtn');
            if (btn.style.position !== 'fixed') {
                const rect = btn.getBoundingClientRect();
                btn.style.position = 'fixed';
                btn.style.left = rect.left + 'px';
                btn.style.top = rect.top + 'px';
                btn.style.transition = 'all 0.25s ease';
            }

            setTimeout(() => {
                const maxX = window.innerWidth - btn.offsetWidth - 30;
                const maxY = window.innerHeight - btn.offsetHeight - 30;
                
                const randomX = Math.max(30, Math.floor(Math.random() * maxX));
                const randomY = Math.max(30, Math.floor(Math.random() * maxY));
                
                btn.style.left = randomX + 'px';
                btn.style.top = randomY + 'px';
            }, 10);
        }

        // Evet Butonuna Tıklanınca Sahnelerin Geçişi
        function triggerYes() {
            const ui = document.getElementById('viewInterface');
            const special = document.getElementById('specialScreen');
            const centerLetters = document.getElementById('centerLetters');
            const loveQuote = document.getElementById('loveQuote');
            
            ui.style.opacity = '0';
            
            setTimeout(() => {
                ui.style.display = 'none';
                special.style.display = 'block';
                setTimeout(() => {
                    special.style.opacity = '1';
                    startComplexPlexusHeart();
                    
                    setTimeout(() => {
                        centerLetters.style.opacity = '1';
                        loveQuote.style.opacity = '1';
                    }, 1200);
                }, 50);
            }, 500);
        }

        // --- İNTERAKTİF FİZİK MOTORLU VE KALIN ÇİZGİLİ KALP ALGORİTMASI ---
        const mouse = { x: null, y: null, radius: 100 };

        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; }
        });
        window.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });
        window.addEventListener('touchend', () => { mouse.x = null; mouse.y = null; });

        function startComplexPlexusHeart() {
            const canvas = document.getElementById('heartCanvas');
            const ctx = canvas.getContext('2d');
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            const particles = [];
            const particleCount = 180; 

            function getHeartPoint(t) {
                const scale = Math.min(canvas.width, canvas.height) / 30; 
                return {
                    x: scale * 16 * Math.pow(Math.sin(t), 3),
                    y: -scale * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
                };
            }

            class HeartParticle {
                constructor(targetT) {
                    this.targetT = targetT;
                    this.basePoint = getHeartPoint(this.targetT);
                    
                    this.x = canvas.width / 2 + this.basePoint.x + (Math.random() - 0.5) * 30;
                    this.y = canvas.height / 2 + this.basePoint.y + (Math.random() - 0.5) * 30;
                    
                    this.speed = 0.05;
                    this.radius = Math.random() * 1.5 + 1;
                    this.vibrationSeed = Math.random() * 100;
                }

                update(pulseFactor) {
                    const targetX = canvas.width / 2 + this.basePoint.x * pulseFactor;
                    const targetY = canvas.height / 2 + this.basePoint.y * pulseFactor;

                    this.vibrationSeed += 0.05;
                    const jitterX = Math.sin(this.vibrationSeed) * 3;
                    const jitterY = Math.cos(this.vibrationSeed) * 3;

                    let destX = targetX + jitterX;
                    let destY = targetY + jitterY;

                    if (mouse.x !== null && mouse.y !== null) {
                        const dx = this.x - mouse.x;

                        const distance = Math.sqrt(dx * d
