<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            font-family: 'Press Start 2P', monospace;
            position: relative;
        }

        /* --- KÜÇÜK VE ZARİF PARLAYAN YILDIZLAR --- */
        #starContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle linear infinite;
        }

        @keyframes twinkle {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 0.8; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.3); }
        }

        .wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        /* Klasik Pixel Pencere Tasarımı */
        .pixel-window {
            background-color: rgba(5, 5, 5, 0.9);
            border: 6px double #ffffff;
            width: 440px;
            max-width: 90%;
            box-shadow: 0 0 25px rgba(255,255,255,0.1);
            z-index: 2;
        }

        .window-bar {
            border-bottom: 4px solid #ffffff;
            padding: 10px;
            display: flex;
            gap: 6px;
        }

        .window-dot {
            width: 8px;
            height: 8px;
            border: 2px solid #ffffff;
        }

        .window-body {
            padding: 45px 20px;
            text-align: center;
        }

        .title-text {
            color: #ffffff;
            font-size: 11pt;
            line-height: 1.8;
            margin: 0 0 40px 0;
            font-weight: normal;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn-wrapper {
            width: 100px; 
            display: flex;
            justify-content: center;
        }

        .pixel-btn {
            background: transparent;
            color: #ffffff;
            border: 4px outset #ffffff;
            padding: 12px 24px;
            font-size: 11pt;
            cursor: pointer;
            font-family: 'Press Start 2P', monospace;
            outline: none;
        }

        .pixel-btn:hover {
            background: #ffffff;
            color: #000000;
            border: 4px inset #ffffff;
        }

        #noBtn {
            position: relative;
            z-index: 9999;
        }

        /* --- EVET EKRANI VE GEOMETRİK KALP ALANI --- */
        .special-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        #heartCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 21;
        }

        /* Kalbin Ortasında Parlayan Pembe D Yazısı */
        .center-d {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 25;
            color: #ff66cc;
            font-size: 50pt;
            font-family: 'Press Start 2P', monospace;
            opacity: 0;
            transition: opacity 3s ease-in-out;
            text-shadow: 0 0 15px #ff66cc, 0 0 30px #ff007f, 0 0 50px #ff0055;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Arka Plan Yıldızları -->
    <div id="starContainer"></div>

    <!-- Soru Arayüzü -->
    <div class="wrapper" id="viewInterface">
        <div class="pixel-window">
            <div class="window-bar">
                <span class="window-dot"></span>
                <span class="window-dot"></span>
                <span class="window-dot"></span>
            </div>
            <div class="window-body">
                <h1 class="title-text">Ne kadar tartışsakda seni seviyorum peki sen?</h1>
                <div class="btn-container">
                    <div class="btn-wrapper">
                        <button class="pixel-btn" onclick="triggerYes()">Yes</button>
                    </div>
                    <div class="btn-wrapper">
                        <button class="pixel-btn" id="noBtn" onmouseover="fleeNo(event)" ontouchstart="fleeNo(event)">No</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Videodaki Takımyıldızı Kalp Ekranı -->
    <div class="special-screen" id="specialScreen">
        <canvas id="heartCanvas"></canvas>
        <div class="center-d" id="letterD">D</div>
    </div>

    <script>
        // Arka plandaki küçük zarif yıldızlar
        function createSmallStars() {
            const container = document.getElementById('starContainer');
            const starCount = 40; 

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                
                const size = Math.random() * 2 + 1.5; 
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                
                star.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                star.style.animationDelay = (Math.random() * 3) + 's';
                
                container.appendChild(star);
            }
        }
        createSmallStars();

        // Akıllı Kaçan No Butonu
        function fleeNo(e) {
            if (e && e.type === 'touchstart') e.preventDefault();
            
            const btn = document.getElementById('noBtn');
            if (btn.style.position !== 'fixed') {
                const rect = btn.getBoundingClientRect();
                btn.style.position = 'fixed';
                btn.style.left = rect.left + 'px';
                btn.style.top = rect.top + 'px';
                btn.style.transition = 'all 0.25s ease';
            }

            setTimeout(() => {
                const maxX = window.innerWidth - btn.offsetWidth - 30;
                const maxY = window.innerHeight - btn.offsetHeight - 30;
                
                const randomX = Math.max(30, Math.floor(Math.random() * maxX));
                const randomY = Math.max(30, Math.floor(Math.random() * maxY));
                
                btn.style.left = randomX + 'px';
                btn.style.top = randomY + 'px';
            }, 10);
        }

        // Evet'e basınca geçiş mekanizması
        function triggerYes() {
            const ui = document.getElementById('viewInterface');
            const special = document.getElementById('specialScreen');
            const letterD = document.getElementById('letterD');
            
            ui.style.opacity = '0';
            
            setTimeout(() => {
                ui.style.display = 'none';
                special.style.display = 'block';
                setTimeout(() => {
                    special.style.opacity = '1';
                    // Videodaki gerçek örümcek ağı kalbi başlatır
                    startComplexPlexusHeart();
                    
                    // Kalp belirdikten sonra D harfi arkadan süzülerek gelir
                    setTimeout(() => {
                        letterD.style.opacity = '1';
                    }, 1200);
                }, 50);
            }, 500);
        }

        // --- VİDEODAKİ GEOMETRİK BAĞLANTILI KALP ALGORİTMASI (PLEXUS MESH) ---
        function startComplexPlexusHeart() {
            const canvas = document.getElementById('heartCanvas');
            const ctx = canvas.getContext('2d');
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            const particles = [];
            // Net geometrik hatlar ve çizgiler için ideal nokta sayısı
            const particleCount = 180; 

            // Videodaki matematiksel kalp eğrisi formülü
            function getHeartPoint(t) {
                const scale = Math.min(canvas.width, canvas.height) / 30; 
                return {
                    x: scale * 16 * Math.pow(Math.sin(t), 3),
                    y: -scale * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
                };
            }

            class HeartParticle {
                constructor(targetT) {
                    this.targetT = targetT;
                    this.basePoint = getHeartPoint(this.targetT);
                    
                    // Kalbin etrafında mikro titreşimler yapması için rastgelelik
                    this.x = canvas.width / 2 + this.basePoint.x + (Math.random() - 0.5) * 30;
                    this.y = canvas.height / 2 + this.basePoint.y + (Math.random() - 0.5) * 30;
                    
                    this.speed = Math.random() * 0.03 + 0.02;
                    this.radius = Math.random() * 1.5 + 1;
                    this.vibrationSeed = Math.random() * 100;
                }

                update(pulseFactor) {
                    // Kalp ritmine göre hedef noktayı sürekli güncelle
                    const targetX = canvas.width / 2 + this.basePoint.x * pulseFactor;
                    const targetY = canvas.height / 2 + this.basePoint.y * pulseFactor;

                    this.vibrationSeed += 0.05;
                    // Videodaki gibi noktaların canlı gibi titremesi sağlanır
                    const jitterX = Math.sin(this.vibrationSeed) * 4;
                    const jitterY = Math.cos(this.vibrationSeed) * 4;

                    // Yumuşak takip mekanizması
                    this.x += (targetX + jitterX - this.x) * this.speed;
                    this.y += (targetY + jitterY - this.y) * this.speed;
                }

                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowBlur = 4;
                    ctx.shadowColor = '#ffffff';
                    ctx.fill();
                }
            }

            // Kalp formunun üzerine noktaları diz
            for (let i = 0; i < particleCount; i++) {
                const t = (i / particleCount) * Math.PI * 2;
                particles.push(new HeartParticle(t));
            }

            let timeCounter = 0;

            function renderLoop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                timeCounter += 0.04;

                // Kalbin kasılıp gevşeme (Atış) katsayısı
                const pulseFactor = 1 + 0.08 * Math.sin(timeCounter * 1.5);

                // 1. Adım: Tüm noktaların yerini güncelle ve çiz
                particles.forEach(p => {
                    p.update(pulseFactor);
                    p.draw();
                });

                // 2. Adım: VİDEODAKİ ANA EFEKT - Noktaları birbirine örümcek ağı gibi bağla
                ctx.shadowBlur = 0; // Çizgilerde kasma yapmaması için gölge sıfırlanır
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        // Eğer iki nokta birbirine yeterince yakınsa aralarında çizgi ör
                        // Mesafe sınırını videodaki sıklığa göre ayarladım (65px)
                        if (distance < 65) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            
                            // Yakınlığa göre çizginin opaklığı değişir (Birebir video estetiği)
                            const opacity = (1 - distance / 65) * 0.4;
                            ctx.strokeStyle = `rgba(255, 255, 255, ${opacity})`;
                            ctx.lineWidth = 0.6;
                            ctx.stroke();
                        }
                    }
                }

                requestAnimationFrame(renderLoop);
            }

            renderLoop();
        }
    </script>
</body>
</html>
