<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Aşığım</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-color: #000000; --text-color: #ffffff; --star-color: #ffffff; }
        body { background-color: var(--bg-color); margin: 0; padding: 0; overflow: hidden; height: 100vh; font-family: 'Press Start 2P', monospace; transition: background-color 0.5s ease; }
        body.white-theme { --bg-color: #ffffff; --text-color: #000000; --star-color: #000000; }

        /* --- TEMA DEĞİŞTİRME BUTONU (TOGGLE SWITCH) --- */
        .theme-switch {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            width: 60px;
            height: 34px;
            z-index: 999999;
        }

        .theme-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(26px); }

        /* --- PARMAK İZİ KİLİT EKRANI --- */
        #lockScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #000000; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1.2s; }
        .lock-title { font-family: 'Dancing Script', cursive; color: #ffffff; font-size: 32pt; margin-bottom: 50px; text-shadow: 0 0 10px rgba(255, 255, 255, 0.4); user-select: none; }
        
        .scanner-container { width: 220px; height: 220px; border-radius: 50%; border: 3px solid rgba(255, 45, 85, 0.2); display: flex; justify-content: center; align-items: center; box-shadow: 0 0 25px rgba(255, 45, 85, 0.1); cursor: pointer; user-select: none; -webkit-user-select: none; touch-action: none; }
        
        .scanner-container.scanning { animation: spinRing 4s linear infinite; border-top: 3px solid #ff2d55; border-bottom: 3px solid #ff2d55; box-shadow: 0 0 25px rgba(255, 45, 85, 0.4); }
        @keyframes spinRing { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .scanner-inner { position: absolute; width: 150px; height: 180px; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .scanner-container.scanning .scanner-inner { animation: stopSpin 4s linear infinite reverse; }
        @keyframes stopSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .fingerprint-svg { width: 110px; height: 140px; fill: none; stroke: rgba(255, 45, 85, 0.4); stroke-width: 10; stroke-linecap: round; transition: filter 0.3s ease, stroke 0.3s ease; }
        .scanner-container.scanning .fingerprint-svg { stroke: #ff2d55; filter: drop-shadow(0 0 12px #ff2d55); }
        
        .laser-line { position: absolute; left: 0; width: 100%; height: 4px; background: rgba(255, 45, 85, 0.3); top: 50%; pointer-events: none; }
        .scanner-container.scanning .laser-line { background: #ff2d55; box-shadow: 0 0 15px #ff2d55, 0 0 25px #ff2d55; animation: scanMotion 1.2s ease-in-out infinite; }
        @keyframes scanMotion { 0% { top: 10%; } 50% { top: 90%; } 100% { top: 10%; } }
        
        .lock-footer { font-family: Arial, sans-serif; font-style: italic; color: rgba(255, 255, 255, 0.6); font-size: 14pt; margin-top: 50px; user-select: none; }

        /* --- YILDIZLAR --- */
        #starContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .star { position: absolute; background-color: var(--star-color); clip-path: polygon(50% 0%, 63% 37%, 100% 50%, 63% 63%, 50% 100%, 37% 63%, 0% 50%, 37% 37%); opacity: 0; animation: twinkle linear infinite; }
        @keyframes twinkle { 0% { opacity: 0; transform: scale(0.3); } 50% { opacity: 0.8; transform: scale(1); } 100% { opacity: 0; transform: scale(0.3); } }

        /* --- ARAYÜZ --- */
        .wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 10; transition: opacity 0.5s ease; }
        .pixel-window { background-color: var(--bg-color); border: 6px double var(--text-color); width: 440px; max-width: 90%; box-shadow: 0 0 25px rgba(255,255,255,0.05); z-index: 2; transition: all 0.5s ease; }
        .window-bar { border-bottom: 4px solid var(--text-color); padding: 10px; display: flex; gap: 6px; }
        .window-dot { width: 8px; height: 8px; border: 2px solid var(--text-color); }
        .window-body { padding: 45px 20px; text-align: center; }
        .title-text { color: var(--text-color); font-size: 11pt; line-height: 1.8; margin: 0 0 40px 0; font-weight: normal; }
        
        .btn-container { display: flex; justify-content: center; gap: 50px; margin-top: 25px; }
        .btn-wrapper { min-width: 120px; display: flex; justify-content: center; }
        .pixel-btn { background: transparent; color: var(--text-color); border: 4px outset var(--text-color); padding: 12px 24px; font-size: 11pt; cursor: pointer; font-family: 'Press Start 2P', monospace; outline: none; }
        .pixel-btn:hover { background: var(--text-color); color: var(--bg-color); border: 4px inset var(--text-color); }
        #noBtn { position: relative; z-index: 9999; }

        /* --- KALP VE YAZILAR EKRANI --- */
        .special-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; opacity: 0; transition: opacity 0.8s ease; }
        #heartCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 21; }
        
        .center-letters { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 25; font-size: 45pt; font-family: 'Press Start 2P', monospace; display: flex; gap: 25px; pointer-events: none; opacity: 0; transition: opacity 2.5s ease-in-out; }
        
        /* GÜNCELLEME 1: HARFLERİN PARLAMASI */
        .char-d, .char-m { 
            transition: opacity 0.4s ease, color 0.4s ease;
            animation: letterGlow 1.5s ease-in-out infinite alternate;
        }

        /* currentColor sayesinde rengi neyse o renkte parlama yayar */
        @keyframes letterGlow {
            0% { text-shadow: 0 0 10px currentColor, 0 0 20px currentColor; }
            100% { text-shadow: 0 0 20px currentColor, 0 0 35px currentColor, 0 0 50px currentColor; }
        }

        /* GÜNCELLEME 2: YAZININ KALINLAŞMASI */
        .love-quote { 
            position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%); z-index: 26; 
            font-family: 'Great Vibes', cursive; color: #8a0303; font-size: 48pt; 
            font-weight: bold; /* Kalınlık eklendi */
            -webkit-text-stroke: 1.5px #8a0303; /* Ekstra dolgunluk/kalınlık eklendi */
            text-align: center; width: 100%; opacity: 0; transition: opacity 3s ease-in-out; 
            text-shadow: 0 0 15px rgba(138, 3, 3, 0.6); pointer-events: none; 
        }
    </style>
</head>
<body>

    <label id="themeToggleBtn" class="theme-switch">
        <input type="checkbox" onchange="toggleTheme()">
        <span class="slider"></span>
    </label>

    <div id="lockScreen">
        <div class="lock-title">Para ti, mi amor</div>
        
        <div class="scanner-container" id="scannerZone" 
             onmousedown="startScan(event)" 
             onmouseup="cancelScan(event)" 
             onmouseleave="cancelScan(event)" 
             ontouchstart="startScan(event)" 
             ontouchend="cancelScan(event)" 
             ontouchcancel="cancelScan(event)"
             oncontextmenu="return false;">
            <div class="scanner-inner">
                <div class="laser-line"></div>
                <svg class="fingerprint-svg" viewBox="0 0 512 512">
                    <path d="M256,440 C320,440 360,400 360,320 C360,220 290,160 256,160 C222,160 152,220 152,320 C152,350 160,380 180,410" />
                    <path d="M210,425 C200,410 192,380 192,320 C192,250 230,200 256,200 C282,200 320,250 320,320 C320,380 300,410 280,425" />
                    <path d="M256,360 C270,360 280,340 280,320 C280,280 265,240 256,240 C247,240 232,280 232,320 C232,340 242,360 256,360" />
                    <path d="M120,320 C120,180 200,120 256,120 C312,120 392,180 392,320 C392,410 330,460 256,460 C210,460 160,440 130,410" />
                    <path d="M90,340 C90,150 180,80 256,80 C332,80 422,150 422,340 C422,430 370,490 256,490" />
                </svg>
            </div>
        </div>

        <div class="lock-footer">Casi listo...</div>
    </div>

    <div id="starContainer"></div>

    <div class="wrapper" id="viewInterface">
        <div class="pixel-window">
            <div class="window-bar">
                <span class="window-dot"></span>
                <span class="window-dot"></span>
                <span class="window-dot"></span>
            </div>
            <div class="window-body">
                <h1 class="title-text">Ne kadar tartışsakda seni seviyorum peki sen?</h1>
                <div class="btn-container">
                    <div class="btn-wrapper">
                        <button class="pixel-btn" onclick="triggerYes()">Evet</button>
                    </div>
                    <div class="btn-wrapper">
                        <button class="pixel-btn" id="noBtn" onmouseover="fleeNo(event)" ontouchstart="fleeNo(event)">Hayır</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="special-screen" id="specialScreen">
        <canvas id="heartCanvas"></canvas>
        <div class="center-letters" id="centerLetters">
            <span id="letterD" class="char-d">D</span>
            <span id="letterM" class="char-m">M</span>
        </div>
        <div class="love-quote" id="loveQuote">Sana aşığım lan</div>
    </div>
        <script>
        // --- PARMAK İZİ MANTIĞI ---
        let scanTimer = null;
        let isScanning = false;

        function startScan(e) {
            if (e && e.cancelable && e.type !== 'mousedown') e.preventDefault();
            if (isScanning) return; 
            isScanning = true;

            document.getElementById('scannerZone').classList.add('scanning');
            
            scanTimer = setTimeout(() => {
                const lock = document.getElementById('lockScreen');
                lock.style.opacity = '0';
                lock.style.visibility = 'hidden';
                document.getElementById('themeToggleBtn').style.display = 'inline-block'; 
                applyLetterVisibility(); 
            }, 1500);
        }

        function cancelScan(e) {
            if (scanTimer) {
                clearTimeout(scanTimer);
                scanTimer = null;
            }
            isScanning = false;
            document.getElementById('scannerZone').classList.remove('scanning');
        }

        // --- TEMA VE HARF GÖRÜNÜRLÜĞÜ ---
        function toggleTheme() {
            document.body.classList.toggle('white-theme');
            applyLetterVisibility();
        }

        function applyLetterVisibility() {
            const isWhiteTheme = document.body.classList.contains('white-theme');
            const mLetter = document.getElementById('letterM');
            const dLetter = document.getElementById('letterD');
            
            if (isWhiteTheme) {
                if(dLetter) {
                    dLetter.style.opacity = '1';
                    dLetter.style.color = '#000000'; 
                }
                if(mLetter) mLetter.style.opacity = '0';
            } else {
                if(mLetter) {
                    mLetter.style.opacity = '1';
                    mLetter.style.color = '#ffffff';
                }
                if(dLetter) dLetter.style.opacity = '0';
            }
        }

        function createSmallStars() {
            const container = document.getElementById('starContainer');
            const starCount = 45; 

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                
                const size = Math.random() * 5 + 4; 
                star.style.width = size + 'px';
                star.style.height = (size * 1.2) + 'px';
                
                star.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                star.style.animationDelay = (Math.random() * 3) + 's';
                
                container.appendChild(star);
            }
        }
        createSmallStars();

        function fleeNo(e) {
            if (e && e.type === 'touchstart') e.preventDefault();
            
            const btn = document.getElementById('noBtn');
            if (btn.style.position !== 'fixed') {
                const rect = btn.getBoundingClientRect();
                btn.style.position = 'fixed';
                btn.style.left = rect.left + 'px';
                btn.style.top = rect.top + 'px';
                btn.style.transition = 'all 0.25s ease';
            }

            setTimeout(() => {
                const maxX = window.innerWidth - btn.offsetWidth - 30;
                const maxY = window.innerHeight - btn.offsetHeight - 30;
                
                const randomX = Math.max(30, Math.floor(Math.random() * maxX));
                const randomY = Math.max(30, Math.floor(Math.random() * maxY));
                
                btn.style.left = randomX + 'px';
                btn.style.top = randomY + 'px';
            }, 10);
        }

        function triggerYes() {
            const ui = document.getElementById('viewInterface');
            const special = document.getElementById('specialScreen');
            const centerLetters = document.getElementById('centerLetters');
            const loveQuote = document.getElementById('loveQuote');
            
            ui.style.opacity = '0';
            
            setTimeout(() => {
                ui.style.display = 'none';
                special.style.display = 'block';
                setTimeout(() => {
                    special.style.opacity = '1';
                    startComplexPlexusHeart();
                    
                    setTimeout(() => {
                        centerLetters.style.opacity = '1';
                        loveQuote.style.opacity = '1';
                    }, 1200);
                }, 50);
            }, 500);
        }

        const mouse = { x: null, y: null, radius: 100 };

        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; }
        });
        window.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });
        window.addEventListener('touchend', () => { mouse.x = null; mouse.y = null; });

        function startComplexPlexusHeart() {
            const canvas = document.getElementById('heartCanvas');
            const ctx = canvas.getContext('2d');
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            const particles = [];
            const particleCount = 180; 

            function getHeartPoint(t) {
                const scale = Math.min(canvas.width, canvas.height) / 30; 
                return {
                    x: scale * 16 * Math.pow(Math.sin(t), 3),
                    y: -scale * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
                };
            }

            class HeartParticle {
                constructor(targetT) {
                    this.targetT = targetT;
                    this.basePoint = getHeartPoint(this.targetT);
                    
                    this.x = canvas.width / 2 + this.basePoint.x + (Math.random() - 0.5) * 30;
                    this.y = canvas.height / 2 + this.basePoint.y + (Math.random() - 0.5) * 30;
                    
                    this.speed = 0.05;
                    this.radius = Math.random() * 1.5 + 1;
                    this.vibrationSeed = Math.random() * 100;
                }

                update(pulseFactor) {
                    const targetX = canvas.width / 2 + this.basePoint.x * pulseFactor;
                    const targetY = canvas.height / 2 + this.basePoint.y * pulseFactor;

                    this.vibrationSeed += 0.05;
                    const jitterX = Math.sin(this.vibrationSeed) * 3;
                    const jitterY = Math.cos(this.vibrationSeed) * 3;

                    let destX = targetX + jitterX;
                    let destY = targetY + jitterY;

                    if (mouse.x !== null && mouse.y !== null) {
                        const dx = this.x - mouse.x;
                        const dy = this.y - mouse.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < mouse.radius) {
                            const force = (mouse.radius - distance) / mouse.radius;
                            const angle = Math.atan2(dy, dx);
                            destX += Math.cos(angle) * force * 120; 
                            destY += Math.sin(angle) * force * 120;
                        }
                    }

                    this.x += (destX - this.x) * this.speed;
                    this.y += (destY - this.y) * this.speed;
                }

                draw(color) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = color;
                    ctx.fill();
                }
            }

            for (let i = 0; i < particleCount; i++) {
                const t = (i / particleCount) * Math.PI * 2;
                particles.push(new HeartParticle(t));
            }

            let timeCounter = 0;

            function renderLoop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                timeCounter += 0.04;

                const currentThemeColor = document.body.classList.contains('white-theme') ? '#000000' : '#ffffff';

                const pulseFactor = 1 + 0.08 * Math.sin(timeCounter * 1.5);

                particles.forEach(p => {
                    p.update(pulseFactor);
                    p.draw(currentThemeColor);
                });

                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance < 65) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            
                            const opacity = (1 - distance / 65) * 0.35;
                            
                            if(document.body.classList.contains('white-theme')) {
                                ctx.strokeStyle = `rgba(0, 0, 0, ${opacity})`;
                            } else {
                                ctx.strokeStyle = `rgba(255, 255, 255, ${opacity})`;
                            }
                            
                            ctx.lineWidth = 1.5; 
                            ctx.stroke();
                        }
                    }
                }

                requestAnimationFrame(renderLoop);
            }

            requestAnimationFrame(renderLoop);
        }
    </script>
</body>
</html>
